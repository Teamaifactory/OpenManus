<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenManus - AI Agent</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 700px;
            width: 100%;
            padding: 40px;
            display: flex;
            flex-direction: column;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo {
            font-size: 48px;
            margin-bottom: 10px;
        }

        h1 {
            color: #333;
            font-size: 32px;
            margin-bottom: 10px;
        }

        .subtitle {
            color: #666;
            font-size: 16px;
        }

        /* ── Chat history ── */
        .chat-history {
            background: #f7f7fb;
            border: 1px solid #e0e0e0;
            border-radius: 14px;
            padding: 16px;
            min-height: 200px;
            max-height: 420px;
            overflow-y: auto;
            margin-bottom: 24px;
            display: flex;
            flex-direction: column;
            gap: 14px;
            scroll-behavior: smooth;
        }

        .chat-history:empty::before {
            content: "Your conversation will appear here\2026";
            color: #bbb;
            font-size: 14px;
            text-align: center;
            margin: auto;
        }

        /* Individual chat bubbles */
        .chat-message {
            display: flex;
            flex-direction: column;
            max-width: 80%;
        }

        .chat-message.user {
            align-self: flex-end;
            align-items: flex-end;
        }

        .chat-message.ai {
            align-self: flex-start;
            align-items: flex-start;
        }

        .chat-bubble {
            padding: 12px 16px;
            border-radius: 16px;
            font-size: 15px;
            line-height: 1.5;
            word-break: break-word;
            white-space: pre-wrap;
        }

        .chat-message.user .chat-bubble {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-bottom-right-radius: 4px;
        }

        .chat-message.ai .chat-bubble {
            background: #ececec;
            color: #333;
            border-bottom-left-radius: 4px;
        }

        .chat-meta {
            font-size: 11px;
            color: #aaa;
            margin-top: 4px;
            padding: 0 4px;
        }

        /* File attachments inside a message */
        .chat-attachments {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-top: 6px;
        }

        .chat-attachment-tag {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            background: rgba(102, 126, 234, 0.15);
            color: #555;
            border-radius: 20px;
            padding: 3px 10px;
            font-size: 12px;
            border: 1px solid rgba(102, 126, 234, 0.3);
        }

        /* Typing indicator */
        .typing-indicator .chat-bubble {
            display: flex;
            align-items: center;
            gap: 5px;
            padding: 14px 18px;
        }

        .typing-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #999;
            animation: typingBounce 1.2s infinite ease-in-out;
        }

        .typing-dot:nth-child(2) { animation-delay: 0.2s; }
        .typing-dot:nth-child(3) { animation-delay: 0.4s; }

        @keyframes typingBounce {
            0%, 80%, 100% { transform: translateY(0); opacity: 0.5; }
            40%            { transform: translateY(-6px); opacity: 1; }
        }

        /* ── Input area ── */
        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            color: #333;
            font-weight: 600;
            margin-bottom: 10px;
            font-size: 14px;
        }

        textarea {
            width: 100%;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-family: inherit;
            font-size: 16px;
            resize: vertical;
            min-height: 100px;
            transition: border-color 0.3s;
        }

        textarea:focus {
            outline: none;
            border-color: #667eea;
        }

        .button-group {
            display: flex;
            gap: 10px;
        }

        button {
            flex: 1;
            padding: 15px 30px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-submit {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.4);
        }

        .btn-submit:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .btn-clear {
            background: #f0f0f0;
            color: #333;
            flex: 0 0 auto;
            padding: 15px 24px;
        }

        .btn-clear:hover {
            background: #e0e0e0;
        }

        /* ── File upload ── */
        .file-upload-section {
            margin-bottom: 20px;
        }

        .file-upload-area {
            display: flex;
            gap: 10px;
            margin-bottom: 12px;
        }

        .btn-add-file {
            flex: 1;
            padding: 12px 20px;
            background: #f0f0f0;
            color: #333;
            border: 2px dashed #667eea;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-add-file:hover {
            background: #f9f9f9;
            border-color: #764ba2;
        }

        .file-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .file-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 12px;
            background: #f9f9f9;
            border-radius: 8px;
            border-left: 3px solid #667eea;
            font-size: 14px;
        }

        .file-item-name {
            flex: 1;
            color: #333;
            word-break: break-all;
        }

        .file-item-size {
            color: #999;
            font-size: 12px;
            margin: 0 10px;
        }

        .btn-remove-file {
            background: none;
            border: none;
            color: #dc3545;
            cursor: pointer;
            font-size: 18px;
            padding: 0;
            width: 24px;
            height: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .btn-remove-file:hover {
            color: #c82333;
            transform: scale(1.2);
        }

        /* ── Spinner ── */
        .spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 3px solid rgba(255,255,255,0.4);
            border-top: 3px solid white;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-right: 8px;
            vertical-align: middle;
        }

        @keyframes spin {
            0%   { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* ── Footer ── */
        .footer {
            text-align: center;
            margin-top: 24px;
            color: #999;
            font-size: 12px;
        }

        .api-status {
            display: inline-block;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #28a745;
            margin-right: 5px;
        }

        .api-status.offline {
            background: #dc3545;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo">&#x1F422;</div>
            <h1>OpenManus</h1>
            <p class="subtitle">General-Purpose Conversational AI Agent</p>
        </div>

        <!-- Conversation history -->
        <div class="chat-history" id="chatHistory"></div>

        <!-- Input form -->
        <form id="commandForm">
            <div class="form-group">
                <label for="prompt">Enter Command</label>
                <textarea
                    id="prompt"
                    placeholder="Type any command... (e.g., 'create a video about...', 'read my file', 'what can you do?')"
                    required
                ></textarea>
            </div>

            <div class="file-upload-section">
                <label for="fileInput">Attach Files (Optional)</label>
                <div class="file-upload-area">
                    <input
                        type="file"
                        id="fileInput"
                        multiple
                        accept="image/*,video/*,.pdf,.doc,.docx,.txt,.csv,.json,.md"
                        style="display: none;"
                    >
                    <button type="button" class="btn-add-file" id="addFileBtn">
                        &#x1F4CE; Add Files
                    </button>
                </div>
                <div id="fileList" class="file-list"></div>
            </div>

            <div class="button-group">
                <button type="submit" class="btn-submit" id="submitBtn">
                    Enter
                </button>
                <button type="button" class="btn-clear" id="clearBtn">
                    New Chat
                </button>
            </div>
        </form>

        <div class="footer">
            <span class="api-status" id="apiStatus"></span>
            <span id="apiStatusText">Checking API...</span>
        </div>
    </div>

    <script>
        // ── DOM refs ──────────────────────────────────────────────────────────
        const form          = document.getElementById('commandForm');
        const promptInput   = document.getElementById('prompt');
        const submitBtn     = document.getElementById('submitBtn');
        const clearBtn      = document.getElementById('clearBtn');
        const chatHistory   = document.getElementById('chatHistory');
        const apiStatus     = document.getElementById('apiStatus');
        const apiStatusText = document.getElementById('apiStatusText');
        const fileInput     = document.getElementById('fileInput');
        const addFileBtn    = document.getElementById('addFileBtn');
        const fileListEl    = document.getElementById('fileList');

        let selectedFiles = [];
        let conversationHistory = []; // { role: 'user'|'ai', text, files, timestamp }

        // ── File handling ─────────────────────────────────────────────────────
        addFileBtn.addEventListener('click', () => fileInput.click());

        fileInput.addEventListener('change', (e) => {
            selectedFiles = [...selectedFiles, ...Array.from(e.target.files)];
            renderStagedFiles();
            fileInput.value = '';
        });

        function renderStagedFiles() {
            fileListEl.innerHTML = '';
            selectedFiles.forEach((file, index) => {
                const kb = (file.size / 1024).toFixed(1);
                const item = document.createElement('div');
                item.className = 'file-item';
                item.innerHTML =
                    '<span class="file-item-name">&#x1F4CE; ' + escapeHtml(file.name) + '</span>' +
                    '<span class="file-item-size">' + kb + ' KB</span>' +
                    '<button type="button" class="btn-remove-file" data-index="' + index + '" title="Remove">&times;</button>';
                item.querySelector('.btn-remove-file').addEventListener('click', () => {
                    selectedFiles.splice(index, 1);
                    renderStagedFiles();
                });
                fileListEl.appendChild(item);
            });
        }

        // ── API status ────────────────────────────────────────────────────────
        checkApiStatus();
        setInterval(checkApiStatus, 30000);

        async function checkApiStatus() {
            try {
                const res = await fetch('/api/status');
                if (res.ok) {
                    apiStatus.classList.remove('offline');
                    apiStatusText.textContent = 'API Online';
                } else {
                    throw new Error('not ok');
                }
            } catch (e) {
                apiStatus.classList.add('offline');
                apiStatusText.textContent = 'API Offline';
            }
        }

        // ── New Chat ──────────────────────────────────────────────────────────
        clearBtn.addEventListener('click', () => {
            conversationHistory = [];
            chatHistory.innerHTML = '';
            promptInput.value = '';
            selectedFiles = [];
            renderStagedFiles();
            promptInput.focus();
        });

        // ── Submit ────────────────────────────────────────────────────────────
        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            const prompt = promptInput.value.trim();
            if (!prompt) return;

            // Snapshot files attached to this message
            const attachedFiles = [...selectedFiles];

            // Add user message to history and UI
            const userEntry = { role: 'user', text: prompt, files: attachedFiles, timestamp: new Date() };
            conversationHistory.push(userEntry);
            appendMessage(userEntry);

            // Clear input and staged files
            promptInput.value = '';
            selectedFiles = [];
            renderStagedFiles();

            // Show typing indicator
            const typingEl = appendTypingIndicator();

            // Disable submit while waiting
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<span class="spinner"></span>Thinking...';

            try {
                const res = await fetch('/api/command', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: 'prompt=' + encodeURIComponent(prompt)
                });

                typingEl.remove();

                if (res.ok) {
                    const data = await res.json();
                    const aiText = data.message || 'Command received.';
                    const aiEntry = { role: 'ai', text: aiText, files: [], timestamp: new Date() };
                    conversationHistory.push(aiEntry);
                    appendMessage(aiEntry);
                } else {
                    const errEntry = {
                        role: 'ai',
                        text: '\u26A0\uFE0F Server returned ' + res.status + '. Please try again.',
                        files: [],
                        timestamp: new Date()
                    };
                    conversationHistory.push(errEntry);
                    appendMessage(errEntry);
                }
            } catch (err) {
                typingEl.remove();
                const errEntry = {
                    role: 'ai',
                    text: '\u26A0\uFE0F Network error: ' + err.message,
                    files: [],
                    timestamp: new Date()
                };
                conversationHistory.push(errEntry);
                appendMessage(errEntry);
            } finally {
                submitBtn.disabled = false;
                submitBtn.innerHTML = 'Enter';
                promptInput.focus();
            }
        });

        // ── Chat rendering helpers ────────────────────────────────────────────
        function appendMessage(entry) {
            var role = entry.role;
            var text = entry.text;
            var files = entry.files;
            var timestamp = entry.timestamp;

            var wrapper = document.createElement('div');
            wrapper.className = 'chat-message ' + role;

            // Bubble
            var bubble = document.createElement('div');
            bubble.className = 'chat-bubble';
            bubble.textContent = text;
            wrapper.appendChild(bubble);

            // File attachments (user messages only)
            if (files && files.length > 0) {
                var attachRow = document.createElement('div');
                attachRow.className = 'chat-attachments';
                files.forEach(function(f) {
                    var tag = document.createElement('span');
                    tag.className = 'chat-attachment-tag';
                    tag.textContent = '\uD83D\uDCCE ' + f.name;
                    attachRow.appendChild(tag);
                });
                wrapper.appendChild(attachRow);
            }

            // Timestamp
            var meta = document.createElement('div');
            meta.className = 'chat-meta';
            meta.textContent = formatTime(timestamp);
            wrapper.appendChild(meta);

            chatHistory.appendChild(wrapper);
            chatHistory.scrollTop = chatHistory.scrollHeight;
        }

        function appendTypingIndicator() {
            var wrapper = document.createElement('div');
            wrapper.className = 'chat-message ai typing-indicator';
            var bubble = document.createElement('div');
            bubble.className = 'chat-bubble';
            bubble.innerHTML =
                '<span class="typing-dot"></span>' +
                '<span class="typing-dot"></span>' +
                '<span class="typing-dot"></span>';
            wrapper.appendChild(bubble);
            chatHistory.appendChild(wrapper);
            chatHistory.scrollTop = chatHistory.scrollHeight;
            return wrapper;
        }

        function formatTime(date) {
            return date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        }

        function escapeHtml(str) {
            return str
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;');
        }
    </script>
</body>
</html>
